<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Escape Room Queue</title>
    <link rel="stylesheet" href="/src/css/main.css"/>
    <link href="/src/css/input.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&icon_names=arrow_back,celebration,close,directions_run,flashlight_off,flashlight_on,hourglass_empty,location_on,qr_code_scanner,timer_off&display=block" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>    
    <script>
        document.documentElement.classList.add(localStorage.getItem('funtasia-theme') || 'latte');
    </script>
    <style>
        body { background-color: var(--color-ctp-base); color: var(--color-ctp-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; margin: 0; }
        .queue-container { width: 100%; max-width: 500px; display: block; }
        .hidden { display: none !important; }
        .flex { display: flex !important; }
        .queue-screen { width: 100%; flex-direction: column; align-items: center; }
        /* #queue_qrcode_scanner { width: 100%; max-width: 320px; min-height: 250px; background: var(--color-ctp-surface0); border-radius: 12px; overflow: hidden; margin: 0 auto; } */
        #queue_qrcode_scanner video { object-fit: cover !important; }
    </style>
</head>
<body>
    <div class="modal-wrapper flex">
      <div class="modal-container">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <h1 class="modal-title" id="queue-modal-title">Escape Room Queue</h1>
                    <p class="modal-subtitle" id="queue-modal-subtitle">Check status or join the line</p>
                </div>
            </div>

            <div class="modal-content flex flex-col items-center p-6" id="queue-modal-content">
                <!-- Screen 1: Instructions -->
                <div id="queue-screen-instructions" class="queue-screen flex">
                    <div id="queue-info-grid" class="bg-ctp-surface0 rounded-lg p-4 mb-6 w-full flex flex-col items-center border border-ctp-surface2">
                        <div id="queue-info-stats" class="flex flex-row justify-around w-full">
                            <div class="flex flex-col items-center">
                                <p class="text-ctp-subtext0 text-xs font-bold uppercase tracking-wider mb-1 text-center">People</p>
                                <p id="queue-info-people" class="text-ctp-mauve text-3xl font-bold">-</p>
                            </div>
                            <div class="w-px bg-ctp-surface2"></div>
                            <div class="flex flex-col items-center">
                                <p class="text-ctp-subtext0 text-xs font-bold uppercase tracking-wider mb-1 text-center">Wait Time</p>
                                <p id="queue-info-wait" class="text-ctp-mauve text-3xl font-bold">-</p>
                            </div>
                        </div>
                        <div id="queue-info-unavailable" class="hidden text-ctp-mauve text-xl font-bold py-2">Offline</div>
                    </div>
                    <p class="text-center text-ctp-text mb-6">Visit the Escape Room booth and make payment before joining the virtual queue.</p>
                    <button id="queue-scan-btn" class="queue-action-btn w-full">Join Queue</button>
                </div>

                <!-- Screen 2: Scanner -->
                <div id="queue-screen-scanner" class="queue-screen hidden">
                    <button id="queue-back-to-instructions-btn" class="self-start flex items-center gap-2 text-ctp-mauve font-bold mb-4">
                        <span class="material-symbols-outlined">arrow_back</span> Back
                    </button>
                    <div id="queue_qrcode_scanner" class="qr-scanner-container mx-auto"></div>
                    <div id="queue-camera-loading" class="hidden items-center justify-center gap-3 text-ctp-mauve mt-6">
                        <span class="material-symbols-outlined animate-[spin_2s_ease-in-out_infinite] text-[28px]">hourglass_empty</span>
                        <span class="font-bold text-lg">Fetching Camera</span>
                    </div>
                    <p id="queue-scan-error" class="queue-error-text mt-4 text-center"></p>
                </div>

                <!-- Screen 3: Join -->
                <div id="queue-screen-join" class="queue-screen hidden">
                    <button id="queue-back-to-scanner-btn" class="self-start flex items-center gap-2 text-ctp-mauve font-bold mb-4">
                        <span class="material-symbols-outlined">arrow_back</span> Back
                    </button>
                    <p id="queue-token-timer" class="text-center w-full mb-6 text-ctp-subtext1 font-bold"></p>
                    <input type="text" id="queue-name-input" class="queue-name-input w-full mb-6" placeholder="Your Name" autocomplete="off" />
                    <button id="queue-submit-btn" class="queue-action-btn mb-4">Join Queue</button>
                    <p id="queue-join-error" class="queue-error-text text-center w-full"></p>
                </div>

                <!-- Screen 4: Waiting -->
                <div id="queue-screen-wait" class="queue-screen hidden">
                    <div class="bg-ctp-surface0 rounded-lg p-6 w-full mb-6 border-2 border-dashed border-ctp-surface2 text-center">
                        <h2 id="queue-ticket-number" class="text-5xl font-bold text-ctp-mauve mb-6">#--</h2>
                        <div class="flex justify-between mb-4"><span class="text-ctp-subtext1">Queue Position</span><span id="queue-wait-position" class="font-bold text-xl">--</span></div>
                        <div class="flex justify-between"><span class="text-ctp-subtext1">Est. Wait</span><span id="queue-wait-time" class="font-bold text-xl">--</span></div>
                    </div>
                    <button id="queue-leave-btn" class="queue-leave-btn w-full">Leave Queue</button>
                </div>

                <!-- Screen 5: Notified -->
                <div id="queue-screen-notified" class="queue-screen hidden">
                    <span class="material-symbols-outlined text-[64px] text-ctp-green mb-2 text-center block">celebration</span>
                    <h2 class="text-2xl font-bold text-center mb-6">It's your turn!</h2>
                    <p id="queue-countdown" class="text-ctp-red text-4xl font-bold text-center mb-8">05:00</p>
                    <button id="queue-leave-notified-btn" class="queue-leave-btn w-full">Leave Queue</button>
                </div>

                <!-- Screen 6: Expired -->
                <div id="queue-screen-expired" class="queue-screen hidden text-center">
                    <span class="material-symbols-outlined text-[64px] text-ctp-subtext0 mb-4 block">timer_off</span>
                    <h2 class="text-xl font-bold mb-8">Session Expired</h2>
                    <button id="queue-back-to-start-btn" class="queue-action-btn">Back to start</button>
                </div>
            </div>
            <div class="modal-footer-fade"></div>
        </div>
    </div>

    <div id="toast-popup" class="toast">
        <span id="toast-message"></span>
    </div>

    <script type="module" src="/src/js/queue.js"></script>
</body>
</html>
